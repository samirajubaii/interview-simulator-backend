services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interviewai_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - interviewai

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interviewai_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan queue:work --tries=3 --timeout=60
    networks:
      - interviewai
    depends_on:
      - app
      - db

  nginx:
    image: nginx:alpine
    container_name: interviewai_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - interviewai

  db:
    image: mysql:8.0
    container_name: interviewai_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: interviewai
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: interviewai
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - interviewai

  redis:
    image: redis:alpine
    container_name: interviewai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - interviewai

  frontend:
    image: node:20-alpine
    container_name: interviewai_frontend
    working_dir: /app
    volumes:
      - ../interview-frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "rm -rf node_modules package-lock.json && npm install && npm run dev -- --host"
    networks:
      - interviewai

networks:
  interviewai:
    driver: bridge

volumes:
  dbdata:
    driver: local